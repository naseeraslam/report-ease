version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # It's recommended to pass secrets via a .env file or other secure means
      # For simplicity, we assume appsettings.json is configured for local development
    volumes:
      - fir_db_data:/app # Use a named volume to persist the database

  frontend:
    build:
      context: ./ClientApp
      dockerfile: Dockerfile

  proxy:
    image: nginx:stable-alpine
    ports:
      - "80:80" # This is the main entry point for the application
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  fir_db_data: {}