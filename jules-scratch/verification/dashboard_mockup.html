<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mockup - FIR Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .bg-background { background-color: #F9FAFB; }
        .bg-surface { background-color: #FFFFFF; }
        .text-text { color: #1F2937; }
        .text-text-light { color: #6B7280; }
        .border-border { border-color: #E5E7EB; }
        .btn-primary { background-color: #3B82F6; color: white; }
        .btn-primary:hover { background-color: #2563EB; }
        .btn-secondary { background-color: #6B7280; color: white; }
        .btn-secondary:hover { background-color: #4B5563; }
    </style>
</head>
<body class="bg-background">

    <header class="bg-surface shadow-sm border-b border-border">
        <div class="container mx-auto px-6 py-3">
            <div class="flex items-center justify-between">
                <div class="text-2xl font-bold text-text">FIR Editor</div>
                <nav class="flex items-center space-x-2">
                    <a href="#" class="flex items-center text-gray-600 hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                    <a href="#" class="flex items-center text-gray-600 hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">Reports</a>
                    <a href="#" class="flex items-center text-gray-600 hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">Account</a>
                    <button class="btn-secondary rounded-lg font-bold py-2 px-4 flex items-center">Logout</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-8 px-6">
        <div class="bg-surface p-8 rounded-lg shadow-md border border-border">
            <h1 class="text-3xl font-bold text-text mb-6">Dashboard</h1>
            <p class="text-text-light">Welcome to the FIR Editor dashboard. From here you can manage your reports and account settings.</p>
            <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-gray-50 p-6 rounded-lg border border-border">
                    <h2 class="text-xl font-bold text-text mb-4">Recent Reports</h2>
                    <ul class="space-y-3">
                        <li class="text-text-light">Report #123 - Theft at City Bank</li>
                        <li class="text-text-light">Report #122 - Vandalism at Park</li>
                        <li class="text-text-light">Report #121 - Missing Person</li>
                    </ul>
                </div>
                <div class="bg-gray-50 p-6 rounded-lg border border-border">
                    <h2 class="text-xl font-bold text-text mb-4">Quick Actions</h2>
                    <div class="flex space-x-4">
                        <button class="btn-primary rounded-lg font-bold py-2 px-4">New Report</button>
                        <button class="btn-secondary rounded-lg font-bold py-2 px-4">View All Reports</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
