<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Editor Mockup - FIR Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .bg-background { background-color: #F9FAFB; }
        .bg-surface { background-color: #FFFFFF; }
        .text-text { color: #1F2937; }
        .text-text-light { color: #6B7280; }
        .border-border { border-color: #E5E7EB; }
        .btn-primary { background-color: #3B82F6; color: white; }
        .btn-primary:hover { background-color: #2563EB; }
        .btn-secondary { background-color: #6B7280; color: white; }
        .btn-secondary:hover { background-color: #4B5563; }
        .btn-success { background-color: #10B981; color: white; }
        .btn-success:hover { background-color: #059669; }
    </style>
</head>
<body class="bg-background">

    <header class="bg-surface shadow-sm border-b border-border">
        <div class="container mx-auto px-6 py-3">
            <div class="flex items-center justify-between">
                <div class="text-2xl font-bold text-text">FIR Editor</div>
                <nav class="flex items-center space-x-2">
                    <a href="#" class="flex items-center text-gray-600 hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                    <a href="#" class="flex items-center text-gray-600 hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">Reports</a>
                    <a href="#" class="flex items-center text-gray-600 hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">Account</a>
                    <button class="btn-secondary rounded-lg font-bold py-2 px-4 flex items-center">Logout</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-8 px-6">
        <div class="bg-surface p-8 rounded-lg shadow-md border border-border">
            <h1 class="text-3xl font-bold text-text mb-6">Edit Report</h1>
            <form>
                <div class="mb-6">
                    <label class="block text-text font-bold mb-2">Title</label>
                    <input type="text" value="Theft at City Bank" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div class="mb-6">
                    <label class="block text-text font-bold mb-2">Language</label>
                    <select class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option>English</option>
                        <option>Urdu</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label class="block text-text font-bold mb-2">Content</label>
                    <div class="h-64 p-4 border rounded-lg bg-gray-50">This is a placeholder for the rich text editor.</div>
                </div>
                <div class="flex justify-between items-center">
                    <div class="flex space-x-2">
                        <button type="button" class="btn-success rounded-lg font-bold py-2 px-4">Export as PDF</button>
                        <button type="button" class="btn-secondary rounded-lg font-bold py-2 px-4">Print</button>
                    </div>
                    <div class="flex space-x-2">
                        <button type="button" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg">Cancel</button>
                        <button type="submit" class="btn-primary rounded-lg font-bold py-2 px-4">Update Report</button>
                    </div>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
